<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パーティーロール割り振り</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary {
      display: flex;
      gap: 16px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .summary-item {
      font-size: 13px;
      color: #5f5e5a;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-tank   { background: #378ADD; }
    .dot-healer { background: #1D9E75; }
    .dot-dps    { background: #D85A30; }

    .btn-roll {
      font-size: 15px;
      padding: 10px 28px;
      border-radius: 12px;
      background: #ffffff;
      border: 0.5px solid #b4b2a9;
      color: #1a1a18;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
      transition: background 0.15s;
    }

    .btn-roll:hover  { background: #f1efe8; }
    .btn-roll:active { transform: scale(0.98); }

    .party-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .member-card {
      background: #ffffff;
      border: 0.5px solid #d3d1c7;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .role-icon { font-size: 20px; }

    .member-name {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a18;
    }

    .role-badge {
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 999px;
      display: inline-block;
      width: fit-content;
    }

    .role-tank   { background: #B5D4F4; color: #0C447C; }
    .role-healer { background: #9FE1CB; color: #085041; }
    .role-dps    { background: #F5C4B3; color: #712B13; }

    .animate {
      animation: popIn 0.25s ease both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1c; color: #e8e6df; }
      .btn-roll { background: #2c2c2a; border-color: #5f5e5a; color: #e8e6df; }
      .btn-roll:hover { background: #3a3a38; }
      .member-card { background: #2c2c2a; border-color: #444441; }
      .member-name { color: #e8e6df; }
      .summary-item { color: #b4b2a9; }
      .role-tank   { background: #0C447C; color: #B5D4F4; }
      .role-healer { background: #085041; color: #9FE1CB; }
      .role-dps    { background: #712B13; color: #F5C4B3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      <i class="ti ti-shield-half" aria-hidden="true"></i>
      パーティーロール割り振り
    </h1>

    <div class="summary">
      <span class="summary-item"><span class="dot dot-tank"></span>タンク 2名</span>
      <span class="summary-item"><span class="dot dot-healer"></span>ヒーラー 2名</span>
      <span class="summary-item"><span class="dot dot-dps"></span>DPS 4名</span>
    </div>

    <button class="btn-roll" onclick="rollRoles()">
      <i class="ti ti-refresh" aria-hidden="true"></i> ランダムで割り振る
    </button>

    <div class="party-grid" id="partyGrid"></div>
  </div>

  <script>
    const members = [
      { name: "えるみな",  noRoles: ["healer"] },
      { name: "エルドラ",  noRoles: ["tank"] },
      { name: "りな",      noRoles: ["tank"] },
      { name: "あきら",    noRoles: [], preferNonDps: true },
      { name: "ぴの",      noRoles: [], preferNonDps: true },
      { name: "よなが",    noRoles: [], preferNonDps: true },
      { name: "みすちこ",  noRoles: [], preferNonDps: true },
      { name: "じょい",    noRoles: ["healer"] },
    ];

    const roleConfig = { tank: 2, healer: 2, dps: 4 };
    const roleLabel  = { tank: "タンク", healer: "ヒーラー", dps: "DPS" };
    const roleIcon   = { tank: "ti-shield", healer: "ti-heart", dps: "ti-sword" };
    const roleBadge  = { tank: "role-tank", healer: "role-healer", dps: "role-dps" };

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function rollRoles() {
      let assigned = {};
      let tries = 0;

      while (tries < 500) {
        tries++;
        assigned = {};
        const remaining = { tank: roleConfig.tank, healer: roleConfig.healer, dps: roleConfig.dps };
        const shuffled = shuffle(members);
        let ok = true;

        for (const m of shuffled) {
          const avail = ["tank", "healer", "dps"].filter(r => !m.noRoles.includes(r) && remaining[r] > 0);
          if (!avail.length) { ok = false; break; }

          let role;
          if (m.preferNonDps) {
            const nonDps = avail.filter(r => r !== "dps");
            role = (nonDps.length && Math.random() < 0.65)
              ? nonDps[Math.floor(Math.random() * nonDps.length)]
              : avail[Math.floor(Math.random() * avail.length)];
          } else {
            role = avail[Math.floor(Math.random() * avail.length)];
          }

          assigned[m.name] = role;
          remaining[role]--;
        }

        if (ok && Object.values(remaining).every(v => v === 0)) break;
      }

      const grid = document.getElementById("partyGrid");
      grid.innerHTML = "";

      members.forEach((m, i) => {
        const role = assigned[m.name] || "dps";
        const card = document.createElement("div");
        card.className = "member-card animate";
        card.style.animationDelay = (i * 0.04) + "s";
        card.innerHTML = `
          <div class="role-icon"><i class="ti ${roleIcon[role]}" aria-hidden="true"></i></div>
          <div class="member-name">${m.name}</div>
          <span class="role-badge ${roleBadge[role]}">${roleLabel[role]}</span>
        `;
        grid.appendChild(card);
      });
    }

    rollRoles();
  </script>
</body>
</html>
